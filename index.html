<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Workout">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Workout</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bot:env(safe-area-inset-bottom,0px);
      --bg:#080810;
      --surface:#10101e;
      --surface2:#161628;
      --border:#ffffff14;
      --orange:#ff6b35;
      --teal:#4ecdc4;
      --purple:#8b5cf6;
      --green:#22c55e;
      --txt:#ffffff;
      --muted:#7777aa;
    }
    html,body{height:100%;background:var(--bg);color:var(--txt);
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
      overflow:hidden;user-select:none}

    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 70% 45% at 85% 5%, rgba(255,107,53,.14) 0%, transparent 65%),
        radial-gradient(ellipse 55% 40% at 5% 95%, rgba(139,92,246,.11) 0%, transparent 65%);
    }

    #app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;
      padding-top:var(--safe-top);padding-bottom:var(--safe-bot)}

    .screen{display:none;flex-direction:column;height:100%}
    .screen.active{display:flex}

    /* ══ CONFIRM MODAL ══════════════════════════════════ */
    #modal{
      position:fixed;inset:0;z-index:999;
      background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
      display:none;align-items:flex-end;justify-content:center;
      padding:0 16px calc(var(--safe-bot) + 16px);
    }
    #modal.open{display:flex}
    .modal-box{
      width:100%;max-width:400px;
      background:#1a1a2e;border:1px solid #ffffff18;border-radius:22px;
      overflow:hidden;margin-bottom:8px;
    }
    .modal-title{
      padding:20px 20px 6px;font-size:17px;font-weight:700;text-align:center;
    }
    .modal-msg{
      padding:0 20px 20px;font-size:14px;color:var(--muted);text-align:center;
      line-height:1.5;
    }
    .modal-sep{height:1px;background:#ffffff14}
    .modal-btn{
      width:100%;padding:17px;font-size:16px;font-weight:600;
      background:none;border:none;cursor:pointer;color:var(--txt);
      transition:background .1s;
    }
    .modal-btn:active{background:#ffffff10}
    .modal-btn.danger{color:#ff453a}
    .modal-btn.cancel{color:var(--muted)}
    .modal-btn-sep{height:1px;background:#ffffff14}

    /* ══ HOME ════════════════════════════════════════════ */
    #screen-home{
      padding:0 20px calc(var(--safe-bot) + 24px);
      justify-content:flex-end;gap:14px;
    }
    .home-logo{
      font-size:30px;font-weight:900;letter-spacing:-.5px;
      padding:24px 0 4px;
      background:linear-gradient(135deg,#fff 0%,rgba(255,140,80,.85) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .home-sub{font-size:14px;color:var(--muted);margin-bottom:16px}

    .wcard{
      position:relative;overflow:hidden;border-radius:22px;
      border:1px solid var(--border);cursor:pointer;
      background:var(--surface);min-height:155px;
      transition:transform .13s,box-shadow .13s;
    }
    .wcard:active{transform:scale(.97)}
    .wcard-bg{
      position:absolute;inset:0;
      background-size:cover;background-position:center 20%;
      opacity:.28;
    }
    .wcard-fade{
      position:absolute;inset:0;
      background:linear-gradient(110deg,rgba(8,8,16,.85) 30%,transparent 100%);
    }
    .wcard-body{position:relative;padding:20px 20px 48px}
    .wcard-pill{
      display:inline-flex;align-items:center;gap:5px;
      padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;
      letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;
    }
    .abs .wcard-pill{background:rgba(255,107,53,.18);color:#ff8c5e}
    .chest .wcard-pill{background:rgba(78,205,196,.18);color:#6ee7e1}
    .wcard-name{font-size:22px;font-weight:800;letter-spacing:-.3px}
    .wcard-meta{font-size:13px;color:var(--muted);margin-top:5px}
    .wcard-arr{
      position:absolute;bottom:18px;right:18px;
      width:38px;height:38px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;font-weight:300;
    }
    .abs .wcard-arr{background:rgba(255,107,53,.18);color:var(--orange)}
    .chest .wcard-arr{background:rgba(78,205,196,.18);color:var(--teal)}

    /* ══ TOPBAR ══════════════════════════════════════════ */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 14px 0;flex-shrink:0;gap:10px;
    }
    .topbar-name{
      font-size:12px;font-weight:700;color:var(--muted);
      letter-spacing:1px;text-transform:uppercase;flex:1;
    }
    /* BIG abort button — easy to tap */
    .abort-btn{
      display:flex;align-items:center;gap:6px;
      min-height:44px;min-width:100px;padding:0 14px;
      background:#1e1e32;border:1px solid #ffffff18;border-radius:12px;
      font-size:14px;font-weight:600;color:#ff8888;cursor:pointer;
      flex-shrink:0;
      transition:background .1s;
    }
    .abort-btn:active{background:#2a1a1a}

    /* ══ PROGRESS BAR ════════════════════════════════════ */
    .prog-wrap{padding:10px 18px 0;flex-shrink:0}
    .prog-row{display:flex;justify-content:space-between;
      font-size:11px;color:var(--muted);margin-bottom:6px}
    .prog-track{height:3px;background:#1a1a2e;border-radius:3px}
    .prog-fill{
      height:100%;border-radius:3px;
      background:linear-gradient(90deg,var(--orange),#ffb347);
      transition:width .5s cubic-bezier(.4,0,.2,1);
    }

    /* ══ REST SCREEN ═════════════════════════════════════ */
    #screen-rest{gap:0}

    .rest-body{
      flex:1;display:flex;flex-direction:column;
      align-items:center;padding:0 20px 0;gap:10px;overflow:hidden;
    }
    .rest-top{
      padding-top:14px;display:flex;flex-direction:column;
      align-items:center;flex-shrink:0;
    }
    .rest-num{font-size:80px;font-weight:800;line-height:1;color:var(--orange)}
    .rest-unit{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:1px;text-transform:uppercase}

    .next-lbl{
      font-size:11px;font-weight:700;letter-spacing:1.5px;
      text-transform:uppercase;color:var(--muted);flex-shrink:0;
    }
    .next-name-big{
      width:100%;font-size:40px;font-weight:800;
      white-space:nowrap;overflow:hidden;text-align:center;
      line-height:1.1;flex-shrink:0;
    }
    .next-img-big{
      width:100%;flex:1;min-height:0;
      overflow:hidden;
    }
    .next-img-big img{width:100%;height:100%;object-fit:cover;display:block;}
    .next-val-big{
      font-size:30px;font-weight:700;
      color:var(--orange);flex-shrink:0;padding-bottom:8px;
    }

    /* BIG skip button */
    .skip-btn{
      flex-shrink:0;
      margin:14px 20px 16px;
      height:52px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:14px;font-size:15px;font-weight:600;
      color:var(--teal);cursor:pointer;
      transition:background .1s;
    }
    .skip-btn:active{background:var(--surface2)}

    /* ══ EXERCISE SCREEN ═════════════════════════════════ */
    #screen-exercise{gap:0;align-items:center}

    .ex-name-big{
      width:100%;font-size:40px;font-weight:800;
      white-space:nowrap;overflow:hidden;text-align:center;
      line-height:1.1;flex-shrink:0;padding:10px 20px 0;
    }
    .ex-img-big2{
      width:100%;flex:1;min-height:0;
      overflow:hidden;
    }
    .ex-img-big2 img{
      width:100%;height:100%;object-fit:cover;display:block;
    }
    .ex-val-big{
      font-size:88px;font-weight:900;color:var(--orange);
      flex-shrink:0;line-height:1;padding:10px 0 8px;
    }
    /* Timer ring — bigger */
    .t-ring{position:relative;width:200px;height:200px;flex-shrink:0;margin-top:6px}
    .t-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
    .t-inner{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
    }
    .t-sec{font-size:68px;font-weight:800;line-height:1;color:var(--orange)}
    .t-lbl{font-size:13px;color:var(--muted);margin-top:3px}

    /* Done button */
    .done-btn{
      width:100%;height:64px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      border:none;border-radius:18px;
      font-size:20px;font-weight:800;color:#fff;cursor:pointer;
      box-shadow:0 6px 24px rgba(34,197,94,.22);
      transition:transform .1s;
    }
    .done-btn:active{transform:scale(.97)}

    /* Skip exercise button (for timed) */
    .skip-ex-btn{
      width:100%;height:46px;
      background:none;border:1px solid var(--border);border-radius:14px;
      font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;
      transition:background .1s;
    }
    .skip-ex-btn:active{background:var(--surface)}

    .ex-btns{padding:0 20px 16px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
    .ex-btns-time{padding:0 20px 16px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}

    /* ══ FINISH SCREEN ═══════════════════════════════════ */
    #screen-finish{
      align-items:center;justify-content:center;
      gap:16px;padding:32px 24px;text-align:center;
    }
    .finish-icon{font-size:68px}
    .finish-title{
      font-size:32px;font-weight:900;letter-spacing:-.5px;
      background:linear-gradient(135deg,#fff,var(--orange));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .finish-msg{
      font-size:15px;color:var(--muted);line-height:1.55;
      max-width:300px;
    }
    .finish-stats{
      width:100%;max-width:320px;
      background:var(--surface);border-radius:18px;border:1px solid var(--border);
    }
    .stat-row{
      display:flex;justify-content:space-between;
      padding:13px 18px;font-size:14px;
    }
    .stat-row+.stat-row{border-top:1px solid var(--border)}
    .stat-l{color:var(--muted)}
    .stat-r{font-weight:700}
    .home-btn{
      width:100%;max-width:320px;height:54px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:16px;font-size:16px;font-weight:600;
      color:var(--muted);cursor:pointer;
      transition:color .15s,background .15s;
    }
    .home-btn:active{background:var(--surface2);color:var(--txt)}
  </style>
</head>
<body>
<div id="app">

  <!-- ══ CONFIRM MODAL ═════════════════════════════════ -->
  <div id="modal">
    <div class="modal-box">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-msg" id="modal-msg"></div>
      <div class="modal-sep"></div>
      <button class="modal-btn danger" id="modal-ok" onclick="modalOk()"></button>
      <div class="modal-btn-sep"></div>
      <button class="modal-btn cancel" onclick="modalCancel()">Abbrechen</button>
    </div>
  </div>

  <!-- ══ HOME ══════════════════════════════════════════ -->
  <div id="screen-home" class="screen active">
    <div style="flex:1"></div>
    <div>
      <div style="padding:0 20px">
        <div class="home-logo">💪 Workout</div>
        <div class="home-sub">Wähle dein Training</div>
      </div>
      <div style="padding:0 20px;display:flex;flex-direction:column;gap:14px">
        <div class="wcard abs" onclick="startWorkout('abs')">
          <div class="wcard-bg" id="bg-abs"></div>
          <div class="wcard-fade"></div>
          <div class="wcard-body">
            <div class="wcard-pill">⚡ ABS</div>
            <div class="wcard-name">ABS Advanced</div>
            <div class="wcard-meta">21 Übungen · ~35 Minuten · Bauch &amp; Core</div>
          </div>
          <div class="wcard-arr">›</div>
        </div>
        <div class="wcard chest" onclick="startWorkout('chest')">
          <div class="wcard-bg" id="bg-chest"></div>
          <div class="wcard-fade"></div>
          <div class="wcard-body">
            <div class="wcard-pill">🔥 CHEST</div>
            <div class="wcard-name">Chest Advanced</div>
            <div class="wcard-meta">16 Übungen · ~17 Minuten · Brust &amp; Schultern</div>
          </div>
          <div class="wcard-arr">›</div>
        </div>
      </div>
    </div>
    <div style="height:28px"></div>
  </div>

  <!-- ══ REST ══════════════════════════════════════════ -->
  <div id="screen-rest" class="screen">
    <div class="topbar">
      <span class="topbar-name" id="rest-wname"></span>
      <button class="abort-btn" onclick="askAbort()">✕ Abbrechen</button>
    </div>
    <div class="prog-wrap">
      <div class="prog-row">
        <span id="rest-ptxt"></span>
        <span id="rest-ppct"></span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="rest-pfill"></div></div>
    </div>

    <div class="rest-body">
      <div class="rest-top">
        <div class="rest-num" id="rest-secs">30</div>
        <div class="rest-unit">Sekunden</div>
      </div>
      <div class="next-lbl">Nächste Übung</div>
      <div class="next-name-big" id="next-name"></div>
      <div class="next-img-big"><img id="next-img" src="" alt=""></div>
      <div class="next-val-big" id="next-val"></div>
    </div>

    <button class="skip-btn" onclick="skipRest()">⏭ Pause überspringen</button>
  </div>

  <!-- ══ EXERCISE ═══════════════════════════════════════ -->
  <div id="screen-exercise" class="screen">
    <div class="topbar">
      <span class="topbar-name" id="ex-wname"></span>
      <button class="abort-btn" onclick="askAbort()">✕ Abbrechen</button>
    </div>
    <div class="prog-wrap">
      <div class="prog-row">
        <span id="ex-ptxt"></span>
        <span id="ex-ppct"></span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="ex-pfill"></div></div>
    </div>

    <div class="ex-name-big" id="ex-name"></div>
    <div class="ex-img-big2"><img id="ex-img" src="" alt=""></div>
    <div class="ex-val-big" id="ex-val"></div>
    <!-- Time-based: ring timer -->
    <div class="t-ring" id="t-ring" style="display:none">
      <svg width="200" height="200">
        <circle cx="100" cy="100" r="85" fill="none" stroke="#1a1a2e" stroke-width="9"/>
        <circle id="t-circ" cx="100" cy="100" r="85" fill="none"
          stroke="url(#tg)" stroke-width="9" stroke-linecap="round"
          stroke-dasharray="534" stroke-dashoffset="0"
          style="transition:stroke-dashoffset 1s linear"/>
        <defs>
          <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#4ecdc4"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="t-inner">
        <div class="t-sec" id="t-secs">30</div>
        <div class="t-lbl">Sek.</div>
      </div>
    </div>

    <!-- Rep-based: done button -->
    <div class="ex-btns" id="ex-btns-reps" style="display:none">
      <button class="done-btn" onclick="userDone()">✓ &nbsp;Fertig</button>
      <button class="skip-ex-btn" onclick="askSkipEx()">Übung überspringen</button>
    </div>

    <!-- Time-based: skip button -->
    <div class="ex-btns-time" id="ex-btns-time" style="display:none">
      <button class="skip-ex-btn" onclick="userDone()">⏭ Übung überspringen</button>
    </div>
  </div>

  <!-- ══ FINISH ══════════════════════════════════════════ -->
  <div id="screen-finish" class="screen">
    <div class="finish-icon">🏆</div>
    <div class="finish-title">Geschafft!</div>
    <div class="finish-msg" id="finish-msg"></div>
    <div class="finish-stats" id="finish-stats"></div>
    <button class="home-btn" onclick="goHome()">← Zurück zur Auswahl</button>
  </div>

</div>
<script>
// ── Data ─────────────────────────────────────────────────────────────────
const W = {
  abs:{
    name:"ABS Advanced",
    exercises:[
      {n:"Jumping Jacks",       t:"time",v:30, img:"jumping-jacks"},
      {n:"Sit-Ups",             t:"reps",v:30, img:"sit-ups"},
      {n:"Side Bridges Links",  t:"reps",v:25, img:"side-bridges-left"},
      {n:"Side Bridges Rechts", t:"reps",v:25, img:"side-bridges-right"},
      {n:"Abdominal Crunches",  t:"reps",v:40, img:"abdominal-crunches"},
      {n:"Bicycle Crunches",    t:"reps",v:24, img:"bicycle-crunches"},
      {n:"Side Plank Rechts",   t:"time",v:30, img:"side-plank-right"},
      {n:"Side Plank Links",    t:"time",v:30, img:"side-plank-left"},
      {n:"V-Up",                t:"reps",v:16, img:"v-up"},
      {n:"Push-Up & Rotation",  t:"reps",v:30, img:"push-up-rotation"},
      {n:"Russian Twist",       t:"reps",v:50, img:"russian-twist"},
      {n:"Abdominal Crunches",  t:"reps",v:40, img:"abdominal-crunches"},
      {n:"Butt Bridge",         t:"reps",v:30, img:"butt-bridge"},
      {n:"Heel Touch",          t:"reps",v:40, img:"heel-touch"},
      {n:"Mountain Climber",    t:"reps",v:50, img:"mountain-climber"},
      {n:"Crossover Crunch",    t:"reps",v:30, img:"crossover-crunch"},
      {n:"V-Up",                t:"reps",v:16, img:"v-up"},
      {n:"Plank",               t:"time",v:60, img:"plank"},
      {n:"Cobra Stretch",       t:"time",v:30, img:"cobra-stretch"},
      {n:"Spine Twist Links",   t:"time",v:30, img:"spine-twist-left"},
      {n:"Spine Twist Rechts",  t:"time",v:30, img:"spine-twist-right"},
    ]
  },
  chest:{
    name:"Chest Advanced",
    exercises:[
      {n:"Jumping Jacks",       t:"time",v:30, img:"jumping-jacks"},
      {n:"Arm Circles",         t:"reps",v:20, img:"arm-circles"},
      {n:"Shoulder Stretch",    t:"time",v:30, img:"shoulder-stretch"},
      {n:"Burpees",             t:"reps",v:10, img:"burpees"},
      {n:"Staggered Push-Ups",  t:"reps",v:16, img:"staggered-push-ups"},
      {n:"Hindu Push-Ups",      t:"reps",v:16, img:"hindu-push-ups"},
      {n:"Push-Up & Rotation",  t:"reps",v:16, img:"push-up-rotation"},
      {n:"Diamond Push-Ups",    t:"reps",v:16, img:"diamond-push-ups"},
      {n:"Box Push-Ups",        t:"reps",v:20, img:"box-push-ups"},
      {n:"Hindu Push-Ups",      t:"reps",v:16, img:"hindu-push-ups"},
      {n:"Spiderman Push-Ups",  t:"reps",v:22, img:"spiderman-push-ups"},
      {n:"Decline Push-Ups",    t:"reps",v:16, img:"decline-push-ups"},
      {n:"Burpees",             t:"reps",v:10, img:"burpees"},
      {n:"Shoulder Stretch",    t:"time",v:30, img:"shoulder-stretch"},
      {n:"Cobra Stretch",       t:"time",v:30, img:"cobra-stretch"},
      {n:"Chest Stretch",       t:"time",v:30, img:"chest-stretch"},
    ]
  }
};

const MSGS = [
  "Stark! Du hast heute wieder bewiesen, was in dir steckt. 💪",
  "Ausgezeichnet! Jede Wiederholung zählt — und du hast sie alle gemacht.",
  "Respekt! Disziplin ist der Unterschied zwischen Träumen und Erreichen.",
  "Fantastisch! Dein zukünftiges Ich wird dir danken.",
  "Hammer! Wer früh aufsteht und schwitzt, gewinnt den Tag.",
  "Top-Leistung! Du wirst jeden Tag ein bisschen besser.",
  "Klasse! Kein Workout ist jemals verschwendete Zeit.",
  "Bäm! Du hast heute Morgen mehr getan als die meisten den ganzen Tag.",
  "Super! Konsequenz schlägt Perfektion — und du bist konsequent.",
  "Unglaublich! Jeder Tropfen Schweiß bringt dich deinem Ziel näher.",
];

// ── State ────────────────────────────────────────────────────────────────
let S={key:null,exs:[],idx:0,timer:null,startTime:null,ctx:null,onConfirm:null};

function fitText(el,maxPx){
  el.style.fontSize=maxPx+'px';
  requestAnimationFrame(()=>{
    let size=maxPx;
    while(el.scrollWidth>el.offsetWidth&&size>14){
      size--;el.style.fontSize=size+'px';
    }
  });
}
function fmt(ex){
  if(ex.t==='time'){
    const m=Math.floor(ex.v/60),s=ex.v%60;
    return m>0?`${m}:${String(s).padStart(2,'0')} min`:`${ex.v} Sekunden`;
  }
  return `${ex.v}× Wiederholungen`;
}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
function clearT(){if(S.timer){clearInterval(S.timer);S.timer=null}}
function setProg(f,t,p,i,total,name){
  const pct=Math.round(i/total*100);
  document.getElementById(f).style.width=pct+'%';
  document.getElementById(t).textContent=`${name} · ${i+1} / ${total}`;
  document.getElementById(p).textContent=pct+'%';
}

// ── Modal ────────────────────────────────────────────────────────────────
function openModal(title,msg,okLabel,onOk){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-msg').textContent=msg;
  document.getElementById('modal-ok').textContent=okLabel;
  S.onConfirm=onOk;
  document.getElementById('modal').classList.add('open');
}
function modalOk(){
  document.getElementById('modal').classList.remove('open');
  if(S.onConfirm) S.onConfirm();
  S.onConfirm=null;
}
function modalCancel(){
  document.getElementById('modal').classList.remove('open');
  S.onConfirm=null;
}

function askAbort(){
  openModal(
    'Workout abbrechen?',
    'Dein Fortschritt geht verloren. Wirklich aufhören?',
    '⛔ Ja, abbrechen',
    ()=>{clearT();show('home')}
  );
}
function askSkipEx(){
  openModal(
    'Übung überspringen?',
    'Diese Übung wird nicht gezählt.',
    '⏭ Überspringen',
    ()=>advance()
  );
}

// ── Audio ────────────────────────────────────────────────────────────────
function getCtx(){
  if(!S.ctx) S.ctx=new(window.AudioContext||window.webkitAudioContext)();
  return S.ctx;
}
function ding(){
  try{
    const c=getCtx(),t=c.currentTime;
    // Echter Glockenton: Bell-Obertöne nach Chowning-Verhältnissen
    const base=660;
    [[1.0,.7,3.5],[2.756,.35,2.2],[5.404,.18,1.4],[8.693,.09,.9],[0.5,.25,2.8]].forEach(([r,v,d])=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sine';o.frequency.value=base*r;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(v,t+.006);
      g.gain.exponentialRampToValueAtTime(.001,t+d);
      o.start(t);o.stop(t+d+.05);
    });
  }catch(e){}
}
function tick(){
  try{
    const c=getCtx(),t=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sine';o.frequency.value=1100;
    g.gain.setValueAtTime(.55,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.07);
    o.start(t);o.stop(t+.08);
  }catch(e){}
}

// ── Start ────────────────────────────────────────────────────────────────
function startWorkout(key){
  getCtx();
  S.key=key;S.exs=W[key].exercises;S.idx=0;S.startTime=Date.now();
  showRest();
}

// ── Rest ─────────────────────────────────────────────────────────────────
function showRest(){
  clearT();
  const wname=W[S.key].name, ex=S.exs[S.idx], total=S.exs.length;
  document.getElementById('rest-wname').textContent=wname;
  document.getElementById('next-img').src=IMGS[ex.img];
  const nn=document.getElementById('next-name');
  nn.textContent=ex.n;
  fitText(nn,40);
  document.getElementById('next-val').textContent=fmt(ex);
  setProg('rest-pfill','rest-ptxt','rest-ppct',S.idx,total,wname);

  let rem=30;
  const el=document.getElementById('rest-secs');
  function upd(s){el.textContent=s}
  upd(rem);show('rest');
  S.timer=setInterval(()=>{rem--;upd(rem);if(rem<=5&&rem>0)tick();if(rem<=0){clearT();ding();startEx();}},1000);
}
function skipRest(){clearT();startEx()}

// ── Exercise ─────────────────────────────────────────────────────────────
function startEx(){
  clearT();ding();
  const wname=W[S.key].name, ex=S.exs[S.idx], total=S.exs.length;
  document.getElementById('ex-wname').textContent=wname;
  document.getElementById('ex-img').src=IMGS[ex.img];
  const en=document.getElementById('ex-name');
  en.textContent=ex.n; fitText(en,40);
  const exval=document.getElementById('ex-val');
  exval.textContent=ex.t==='reps'?ex.v+' ×':fmt(ex);
  setProg('ex-pfill','ex-ptxt','ex-ppct',S.idx,total,wname);

  const tring=document.getElementById('t-ring');
  const breps=document.getElementById('ex-btns-reps');
  const btime=document.getElementById('ex-btns-time');

  if(ex.t==='time'){
    tring.style.display='flex'; breps.style.display='none'; btime.style.display='flex';
    exval.style.display='none';
    runTimer(ex.v);
  } else {
    tring.style.display='none'; breps.style.display='flex'; btime.style.display='none';
    exval.style.display='block';
  }
  show('exercise');
}
function runTimer(total){
  let rem=total;
  const C=534,circ=document.getElementById('t-circ'),el=document.getElementById('t-secs');
  function upd(s){circ.style.strokeDashoffset=C*(1-s/total);el.textContent=s}
  upd(rem);
  S.timer=setInterval(()=>{rem--;upd(rem);if(rem<=5&&rem>0)tick();if(rem<=0){clearT();ding();advance();}},1000);
}
function userDone(){clearT();ding();advance()}
function advance(){S.idx++;S.idx>=S.exs.length?showFinish():showRest()}

// ── Finish ────────────────────────────────────────────────────────────────
function showFinish(){
  clearT();
  const elapsed=Math.round((Date.now()-S.startTime)/1000);
  const m=Math.floor(elapsed/60),s=elapsed%60;
  document.getElementById('finish-msg').textContent=MSGS[Math.floor(Math.random()*MSGS.length)];
  document.getElementById('finish-stats').innerHTML=`
    <div class="stat-row"><span class="stat-l">Übungen</span><span class="stat-r">${W[S.key].exercises.length} ✓</span></div>
    <div class="stat-row"><span class="stat-l">Trainingszeit</span><span class="stat-r">${m}:${String(s).padStart(2,'0')} min</span></div>
    <div class="stat-row"><span class="stat-l">Level</span><span class="stat-r">Advanced ⚡</span></div>
  `;
  show('finish');
}
function goHome(){clearT();show('home')}
